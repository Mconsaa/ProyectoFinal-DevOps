filebeat.inputs:
  # Recolectar logs de todos los contenedores Docker
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

# Procesamiento de campos
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~

# Output: Elasticsearch
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "filebeat-%{[agent.version]}-%{+yyyy.MM.dd}"

# Kibana (para cargar dashboards)
setup.kibana:
  host: "kibana:5601"

setup.dashboards.enabled: true
setup.template.enabled: true

# Logging de filebeat mismo
logging.level: info
logging.to_files: false

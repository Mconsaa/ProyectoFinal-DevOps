events {
    worker_connections 1024;
}

http {
    # ── Upstream: 2 instancias de la app ──────────────────────────────
    upstream app_backend {
        least_conn;                    # algoritmo: menos conexiones activas
        server app:5000 max_fails=3 fail_timeout=30s;
    }

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Hardening básico ──────────────────────────────────────────────
    server_tokens off;                 # ocultar versión de Nginx
    client_max_body_size 1m;
    keepalive_timeout 65;

    # ── Servidor principal ────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN"         always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection "1; mode=block"    always;
        add_header Referrer-Policy "no-referrer"        always;

        # Proxy hacia la aplicación
        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # Health check de Nginx mismo
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
